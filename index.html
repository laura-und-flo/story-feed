<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flo & Laura</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #2D3B2D;
            --bg-card: #344034;
            --accent-pink: #D4728C;
            --accent-sage: #8FA98F;
            --text-cream: #F5F0EB;
            --text-mauve: #9B6B7A;
            --text-dim: rgba(245, 240, 235, 0.5);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-cream);
        }

        /* Password Overlay */
        #password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #password-overlay.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        #password-overlay h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 0.5rem;
            color: var(--text-cream);
            text-align: center;
        }

        #password-overlay .subtitle {
            font-size: 0.9rem;
            color: var(--text-mauve);
            margin-bottom: 2.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #password-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }

        #password-input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid var(--accent-sage);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-cream);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #password-input:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(212, 114, 140, 0.15);
        }

        #password-input::placeholder {
            color: var(--text-dim);
        }

        #password-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--accent-pink);
            color: white;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        #password-btn:hover {
            transform: scale(1.02);
            background: #c4627c;
        }

        #password-btn:active {
            transform: scale(0.98);
        }

        .password-error {
            color: var(--accent-pink);
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            height: 1.2rem;
        }

        .password-error.visible {
            opacity: 1;
        }

        /* Story Feed */
        #story-feed {
            display: none;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
        }

        #story-feed.visible {
            display: block;
        }

        .story-card {
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .story-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .story-card .context {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.2rem;
            text-align: center;
            max-width: 300px;
            font-weight: 400;
        }

        .story-card .quote {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            line-height: 1.6;
            text-align: center;
            max-width: 600px;
            color: var(--text-cream);
            font-style: italic;
            position: relative;
        }

        .story-card .quote::before {
            content: '„';
            position: absolute;
            top: -0.8rem;
            left: -0.5rem;
            font-size: 3rem;
            color: var(--accent-pink);
            opacity: 0.3;
            font-style: normal;
        }

        .story-card .attribution {
            margin-top: 2rem;
            text-align: center;
        }

        .story-card .attribution .name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent-sage);
        }

        .story-card .attribution .relation {
            font-size: 0.75rem;
            color: var(--text-mauve);
            margin-top: 0.3rem;
        }

        /* Decorative elements */
        .story-card::after {
            content: '';
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 4px;
            border-radius: 2px;
            background: var(--accent-sage);
            opacity: 0.2;
        }

        /* Finale card */
        .story-card.finale .quote {
            font-size: clamp(1.8rem, 7vw, 3rem);
            font-style: normal;
        }

        .story-card.finale .sub-text {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: var(--text-mauve);
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.4;
            animation: bounce 2s infinite;
            z-index: 10;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        .scroll-hint.hidden {
            opacity: 0;
        }

        .scroll-hint svg {
            width: 24px;
            height: 24px;
            fill: var(--text-cream);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-8px); }
            60% { transform: translateX(-50%) translateY(-4px); }
        }

        /* Desktop adjustments */
        @media (min-width: 768px) {
            .story-card {
                padding: 3rem 2rem;
            }

            .story-card .quote {
                max-width: 550px;
            }
        }

        /* Subtle background gradient per card */
        .story-card:nth-child(odd) {
            background: radial-gradient(ellipse at top right, rgba(143, 169, 143, 0.03) 0%, transparent 60%);
        }

        .story-card:nth-child(even) {
            background: radial-gradient(ellipse at bottom left, rgba(212, 114, 140, 0.03) 0%, transparent 60%);
        }
    </style>
</head>
<body>
    <!-- Password Overlay -->
    <div id="password-overlay">
        <h1>Flo & Laura</h1>
        <p class="subtitle">Ein Geschenk in Worten</p>
        <form id="password-form" onsubmit="return false;">
            <input type="password" id="password-input" placeholder="Passwort eingeben" autocomplete="off">
            <button type="submit" id="password-btn">Eintreten</button>
            <p class="password-error" id="password-error">Falsches Passwort</p>
        </form>
    </div>

    <!-- Scroll Hint -->
    <div class="scroll-hint" id="scroll-hint">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </div>

    <!-- Story Feed -->
    <div id="story-feed"></div>

    <script>
        const CORRECT_PASSWORD = 'lauraundflo4ever';
        const STORAGE_KEY = 'flo_laura_auth';

        // Story data
        const stories = [
            { quote: "Seit Laura in Florians Leben ist, redet er immerhin mit mir. Und er hat festgestellt, dass ich eigentlich auch ganz cool bin.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "TM-Vorlesung, Grundsemester. Flo kommt viel zu spät, läuft rein, völlig verschossen, hockt sich hin, dreht sich einmal kurz um – und pennt ein. Anderthalb Stunden. Komplett durch.", name: "Nico", relation: "Studienfreund" },
            { quote: "Wenn sie zusammen sind, haben sie so ein Strahlen im Gesicht.", name: "Simone", relation: "Patentante" },
            { quote: "Ich habe Flo mit zwei Jahren in die Schiffstraße mitgenommen – eine Raucherkneipe. Er saß an der Theke und hat Marmor getrunken. Zuhause ist Susanne durchgedreht, weil er nach Rauch gestunken hat.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Laura habe ich zum ersten Mal auf einer Demo in Freiburg kennengelernt. Da habe ich schon ihr radikales Potenzial erkannt.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Florian ist der hilfsbereiteste Freund, den ich habe. Wenn man ihn anruft, ist er sofort zur Stelle – ausnahmslos in bester Laune und übersprudelnder Energie.", name: "Ivo", relation: "Arbeitskollege" },
            { quote: "Florian hat mit China-Böllern rumexperimentiert und versucht, das Klassenzimmer im M-Bau in die Luft zu jagen. Gab mies Nachsitzen.", name: "Kai", relation: "Schulfreund" },
            { quote: "Flo gibt nach außen den Ton an – aber niemand wahrnimmt, was Laura eigentlich monatelang im Hintergrund still und heimlich alles macht.", name: "Leonie", relation: "Schwester" },
            { context: "Über die Kindheit:", quote: "Eine der ersten Erinnerungen sind die Übernachtungsparties. Wir haben teilweise bis spät in die Nacht das Brettspiel Carcassonne unter der Bettdecke gespielt.", name: "Max", relation: "Trauzeuge" },
            { quote: "Flo? Der Techno-Wikinger. Laura? Merida – die Prinzessin, die lieber Kriegerin wird.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Flo ist besonders gefährlich, sobald ihm was richtig gut gefällt.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Ich habe ihn ganz oft verkleidet – mit Ohrringen und Kleidchen. Er wollte es aber auch.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Flo war eine der wichtigsten Personen für mich im Studium, weil er uns alle immer vom Stress runtergeholt hat. Sein Motto: ‚Macht euch keinen Stress, es wird easy.' Und irgendwie hatte er jedes Mal recht.", name: "Nico", relation: "Studienfreund" },
            { context: "Erinnerung an die Kindheit:", quote: "Wir saßen kurz vor dem Abitur in der noch nicht umgebauten Küche bei meinen Eltern auf dem Boden. Absolute Nervenbündel, heulend auf dem Küchenboden. Klingt total doof zusammen zu heulen – aber irgendwie ist der Moment trotzdem voll in positiver Erinnerung bei mir abgespeichert.", name: "Leonie", relation: "Schwester" },
            { quote: "50km-Marsch. Ohne Training. Die letzten Kilometer wie Zombies. Ich danach mit Belastungsbruch. Florian mit der größten Blase der Geschichte.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Auf die Frage, was typisch für die beiden ist:", quote: "Katzen. Japan. Und eine kleine Brise strukturiertes Chaos – liebevolles Chaos.", name: "Pia", relation: "Kleine Schwester" },
            { context: "Über Flo:", quote: "Flo war für mich immer eine Stütze. Jemand, wo ich wirklich wusste: Der ist einen Anruf entfernt, egal was los ist.", name: "Max", relation: "Trauzeuge" },
            { context: "Über Laura:", quote: "Laura ist grundsätzlich ein sehr geduldiger Mensch, sehr reif, top organisiert und reflektiert – ein super Gesprächspartner, mit dem es immer Spaß macht.", name: "Moritz", relation: "Freund seit Jugend" },
            { context: "Auf die Frage, wie sie die beiden beschreiben würde:", quote: "Der große, blonde Däne und die kleine, hübsche Frau, die aussieht wie die Khaleesi von Game of Thrones.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Laura fordert Gespräche ein, rüttelt Flo wach – manchmal sanft, manchmal unsanft – und schafft es immer wieder, ihm total liebevoll zu sagen, wenn was scheiße war.", name: "Leonie", relation: "Schwester" },
            { context: "Auf die Frage, wie er die beiden beschreiben würde:", quote: "Der eine ist recht lang und die andere ist weniger lang.", name: "Kai", relation: "Schulfreund" },
            { quote: "Laura kenne ich immer mit einem Lächeln im Gesicht.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Über den Abend, als Flo und Laura wieder zusammenkamen:", quote: "Ich war an dem Abend dabei, als die zwei zueinandergefunden haben. Das war einer der lustigsten Abende, die ich wahrscheinlich je hatte. Da sind 13 Insider entstanden.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Ich saß fassungslos in der ersten Reihe. Aber das Beste? Er hat trotzdem alles gepackt. Immer. Mit weniger Aufwand als alle anderen.", name: "Nico", relation: "Studienfreund" },
            { quote: "Laura und Flo sind ein verrücktes, etwas verpeiltes, aber sehr süßes und intelligentes Künstlerpaar.", name: "Simone", relation: "Patentante" },
            { quote: "Wenn sie mal aneinandergeraten, tauschen sie danach immer verliebte Blicke aus. Meistens endet es in einer Umarmung – vor den Augen aller Anwesenden. Ob die wollen oder nicht.", name: "Leonie", relation: "Schwester" },
            { quote: "An Flo schätze ich, dass er sich unglaublich wenig Gedanken macht. Er trifft einfach Entscheidungen und macht Sachen.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Eigentlich total ungleich – und trotzdem passen sie perfekt zusammen.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Und sie werden super viele schöne Dinge in ihrem Leben erreichen – einfach weil sie zusammen drin stecken.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "Ich habe mit Florian seit zweieinhalb Jahren einen Stammtisch zum Schachspielen. Getroffen haben wir uns bisher genau einmal.", name: "Ivo", relation: "Arbeitskollege" },
            { quote: "Gleich und gleich gesellt sich gern, oder Gegensätze ziehen sich an – die zwei sind die perfekte Mischung aus beidem.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Laura ist seine bessere Seele. Wenn er mal wieder ausartet, holt sie ihn zurück.", name: "Nico", relation: "Studienfreund" },
            { context: "Erinnerung an Flo und Max im Urlaub:", quote: "Max hatte das Kommando beim Angeln. Flo hat sich total cool gefühlt und gedacht, er hat das alles gemanagt. Und ihr kamt dann so stolz zurück. Diese Glückseligkeit habe ich voll oft noch im Kopf.", name: "Leonie", relation: "Schwester" },
            { quote: "Und er hat unglaublich gute Stats bei allen Handyspielen – keinen Zweiten, der sich so rein fokussieren kann.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Beide sind lustig, empathisch, hilfsbereit.", name: "Susanne", relation: "Mama" },
            { quote: "Flo war mein erster Neffe. Ich habe mich damals tierisch auf ihn gefreut. Ab dem Zeitpunkt als er auf der Welt war, habe ich fast jeden Tag mit ihm verbracht. Gewickelt, gehütet, Fahrradtouren gemacht.", name: "Julia / Tante Rosa", relation: "Tante" },
            { context: "Über Laura:", quote: "Laura hat einfach unglaublich krasse Ideen. Diese Grundkreativität – das ist was, was ich sehr bewundere.", name: "Max", relation: "Trauzeuge" },
            { context: "Auf die Frage, was typisch für die beiden ist:", quote: "Lange Balkonabende, Magic und Rastatt.", name: "Ivo", relation: "Arbeitskollege" },
            { quote: "Die zwei kennen und lieben sich seit dem Jugendalter und entscheiden sich immer wieder füreinander und raufen sich immer wieder zusammen.", name: "Leonie", relation: "Schwester" },
            { context: "Über die beiden als Paar:", quote: "Laura als kreativer, ruhigerer Part mit Blick fürs Detail. Und Flo, der das Pragmatische, das große Laute so ein bisschen mit sich bringt.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Ich bin beeindruckt von der Liebe und dem Aufeinanderzugehen, was sie jetzt schon so lange miteinander machen.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "Flo war einfach eine faule Sau. Ich habe mich manchmal zu viel gestresst, er sich zu wenig – und trotzdem hat er es immer gepackt und durchgezogen.", name: "Nico", relation: "Studienfreund" },
            { quote: "Laura sorgt für coole Outfits an Flo.", name: "Simone", relation: "Patentante" },
            { context: "Auf die Frage, was er an Laura bewundert:", quote: "Wie sie mit Flo zurechtkommt. Ein dickes Dankeschön, dass sie mit ihm zusammen ist.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Mein Name ist Kai Ronto, verkehrter Name Rai Kondo, Lieblingswurst Leona und peinliche Geschichte, dass ich gegen den Mark im Apfel-Tennis verloren habe.", name: "Kai", relation: "Schulfreund" },
            { context: "Wie sie Flo beschreiben würde:", quote: "Es war einmal ein sehr groß gewachsener, junger, sehr gut aussehender, blondhaariger Mann, der sich in eine wunderschöne, ein bisschen kleinere junge Frau verliebte.", name: "Leonie", relation: "Schwester" },
            { context: "Auf die Frage, was Laura und Flo besser zusammen können:", quote: "Laura kann Florians manchmal verrückte Art gut in Zaum halten.", name: "Ivo", relation: "Arbeitskollege" },
            { quote: "Es sind einfach beides sehr warme Menschen, die unglaublich gerne Zeit mit Freunden verbringen.", name: "Max", relation: "Trauzeuge" },
            { quote: "Damals war es noch eine Raucherkneipe, jetzt ist es ja wieder eine Raucherkneipe.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Mein Bruder heiratet seine Jugendliebe – und das macht mich sehr glücklich.", name: "Pia", relation: "Kleine Schwester" },
            { context: "Über Laura und Flo als Paar:", quote: "Die ergänzen sich perfekt. Laura ist die, die alles regelt und Flo mal wieder auf Kurs holt.", name: "Nico", relation: "Studienfreund" },
            { quote: "Flo hat immer in seiner Kindheit sich durchsetzen müssen mit seinen zwei Schwestern. Und Laura schafft es, ihm total liebevoll zu sagen, dass Dinge halt echt auch mal scheiße waren.", name: "Leonie", relation: "Schwester" },
            { quote: "Achtet aufeinander – und das auf Augenhöhe.", name: "Simone", relation: "Patentante" },
            { quote: "Die Mischung ist einfach genial.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Klamotten – dafür bewundere ich ihn bis heute noch nicht.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Durch die vielen Jahre kennen die beiden sich in- und auswendig und sind immer bereit, an sich und ihrer Beziehung zu arbeiten.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Über typisches Verhalten der beiden:", quote: "Wenn die Schwestern von Flo mit dabei sind, schießt Flo ein bisschen über das Ziel hinaus. Und Lauri ist immer so ein bisschen mehr am einfangen.", name: "Leonie", relation: "Schwester" },
            { quote: "Was ich mir vorstellen kann: Wenn sie sich was im Kopf gesetzt haben, dass sie das zusammen meistern und zusammen auf den Weg bringen.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Flo ist trotzdem der übelste Macher – aber der braucht einfach jemanden.", name: "Nico", relation: "Studienfreund" },
            { context: "Erinnerung:", quote: "Wir waren in Südfrankreich zusammen – das erste Mal am Meer. Campingurlaub. Viel Fußball, geschwommen, geangelt.", name: "Max", relation: "Trauzeuge" },
            { quote: "Flo ist sieben Jahre älter als ich. In dem Zeitraum war ich echt uncool und Flo hat nicht wirklich mit mir geredet. Laura hat zu ihm irgendwann gesagt, dass das so nicht geht. Dafür bin ich meiner Schwägerin sehr dankbar.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "Laura und ich sind in dieser eigenen Bubble unterwegs. Es ist unglaublich schön, jemanden zu haben, der den eigenen Kontext kennt und auch aus Rastatt kommt.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Meine Beziehung zu dem Brautpaar ist, dass ich das Glück habe, über den beiden zu wohnen.", name: "Kai", relation: "Schulfreund" },
            { quote: "Lauri hält im Hintergrund krank viel zusammen und regelt. Und fordert immer wieder die Gespräche ein.", name: "Leonie", relation: "Schwester" },
            { quote: "Ich bin der Patenonkel von Kiku und Diego. Und unsere Katzen sind die Patenkinder von Florian.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Über Laura:", quote: "Vom Charakter, vom Typus her – Merida passt am besten. Diese Prinzessin, die ihren eigenen Stiefel macht und lieber Kriegerin wird.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Er hat einen Marmor getrunken und wir waren mit dem Fahrrad dort. Ich ließ ihn im Fahrradsitz hinten drauf.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Ich bin ihm echt dankbar. Weil im Endeffekt hat er recht – man hat es immer irgendwie gepackt.", name: "Nico", relation: "Studienfreund" },
            { quote: "Im Urlaub hat Laura versucht Englisch zu sprechen. Flo hat sich über ein einfaches Wort kaputt gelacht. Laura hat die Welt nicht mehr verstanden und möchte seitdem sehr ungern Englisch sprechen.", name: "Simone", relation: "Patentante" },
            { quote: "Aber Lauri kann das sehr klar kommunizieren. Und Flo merkt es dann auch immer.", name: "Leonie", relation: "Schwester" },
            { quote: "Laura ist einfach ein super Gesprächspartner, mit dem es immer Spaß macht, deep talk zu führen.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Auf den Flo ist immer Verlass.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Über die Zukunft:", quote: "Ich glaube, dass diese Ehe immer wieder vor irgendwelchen Projekten stehen wird, die die beiden begleiten werden. Und da freue ich mich sehr, ein Teil von dem Weg zu sein.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "Auch wenn er nicht mehr die langen Haare trägt – der Techno-Wikinger. Und auch wenn sie jetzt nicht mehr die roten Haare hat – Merida. Die Mischung der beiden ist einfach genial, finde ich.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Es wird schwierige Zeiten geben. Aber wenn sie immer zusammenhalten, schaffen sie das.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Beides Menschen, die unglaublich schöne Beziehungen zu den Menschen haben, die ihnen nahe sind.", name: "Max", relation: "Trauzeuge" },
            { quote: "Ihr habt Zeit, bewusst miteinander zu verbringen und ein tolles Leben zu genießen.", name: "Leonie", relation: "Schwester" },
            { context: "Über Laura:", quote: "Ich glaube, Flo ist derjenige, der immer alles entspannt und chillig sieht. Und Laura bringt ein bisschen Struktur in sein Leben.", name: "Nico", relation: "Studienfreund" },
            { quote: "Flo hat einfach immer schon Entscheidungen getroffen und Sachen einfach gemacht.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Und ich hoffe, dass sie noch ganz, ganz viele Genussmomente haben.", name: "Julia / Tante Rosa", relation: "Tante" },
            { quote: "Gemeinsam meistern sie dieses strukturierte Chaos am besten. Genau das ist das, was die auseinander rauskitzeln.", name: "Pia", relation: "Kleine Schwester" },

        const feed = document.getElementById('story-feed');
        const overlay = document.getElementById('password-overlay');
        const passwordInput = document.getElementById('password-input');
        const passwordBtn = document.getElementById('password-btn');
        const passwordError = document.getElementById('password-error');
        const scrollHint = document.getElementById('scroll-hint');

        // Build cards
        function buildCards() {
            feed.innerHTML = '';
            // We render 3 copies for seamless looping
            for (let copy = 0; copy < 3; copy++) {
                stories.forEach((story, index) => {
                    const card = document.createElement('div');
                    card.className = 'story-card';
                    card.dataset.index = index;
                    card.dataset.copy = copy;

                    let html = '';
                    if (story.context) {
                        html += `<p class="context">${story.context}</p>`;
                    }
                    html += `<p class="quote">${story.quote}</p>`;
                    html += `<div class="attribution">
                        <p class="name">${story.name}</p>
                        <p class="relation">${story.relation}</p>
                    </div>`;
                    card.innerHTML = html;
                    feed.appendChild(card);
                });

                // Finale card after each set
                const finale = document.createElement('div');
                finale.className = 'story-card finale';
                finale.dataset.index = 'finale';
                finale.dataset.copy = copy;
                finale.innerHTML = `
                    <p class="quote">Auf euer Abenteuer. 🥂</p>
                    <p class="sub-text">Samba Si, Arbeit No!</p>
                `;
                feed.appendChild(finale);
            }
        }

        // Intersection Observer for animations
        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    } else {
                        entry.target.classList.remove('visible');
                    }
                });
            }, {
                threshold: 0.3
            });

            document.querySelectorAll('.story-card').forEach(card => {
                observer.observe(card);
            });
        }

        // Infinite loop logic
        function setupInfiniteLoop() {
            const totalCards = stories.length + 1; // stories + finale
            const cardHeight = window.innerHeight; // each card is 100vh

            // Start at the middle copy (copy index 1)
            feed.scrollTop = totalCards * cardHeight;

            feed.addEventListener('scroll', () => {
                const scrollTop = feed.scrollTop;
                const oneSetHeight = totalCards * cardHeight;

                // If scrolled into the third copy, jump back to middle
                if (scrollTop >= oneSetHeight * 2) {
                    feed.scrollTop = scrollTop - oneSetHeight;
                }
                // If scrolled above the first copy, jump to middle
                if (scrollTop < oneSetHeight * 0.1) {
                    feed.scrollTop = scrollTop + oneSetHeight;
                }
            });

            // Hide scroll hint after first scroll
            let hintHidden = false;
            feed.addEventListener('scroll', () => {
                if (!hintHidden) {
                    hintHidden = true;
                    scrollHint.classList.add('hidden');
                }
            }, { once: true });
        }

        // Password handling
        function checkPassword(pw) {
            return pw === CORRECT_PASSWORD;
        }

        function unlock() {
            overlay.classList.add('hidden');
            feed.classList.add('visible');
            scrollHint.style.display = 'block';
            setTimeout(() => {
                setupInfiniteLoop();
                setupObserver();
            }, 100);
        }

        // Check localStorage
        if (localStorage.getItem(STORAGE_KEY) === CORRECT_PASSWORD) {
            buildCards();
            unlock();
        } else {
            buildCards();
            scrollHint.style.display = 'none';
        }

        // Password form
        passwordBtn.addEventListener('click', () => {
            const pw = passwordInput.value.trim();
            if (checkPassword(pw)) {
                localStorage.setItem(STORAGE_KEY, pw);
                unlock();
            } else {
                passwordError.classList.add('visible');
                passwordInput.style.borderColor = 'var(--accent-pink)';
                setTimeout(() => {
                    passwordError.classList.remove('visible');
                    passwordInput.style.borderColor = '';
                }, 2000);
            }
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                passwordBtn.click();
            }
        });

        // Handle resize for loop recalculation
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (feed.classList.contains('visible')) {
                    const totalCards = stories.length + 1;
                    const cardHeight = window.innerHeight;
                    const oneSetHeight = totalCards * cardHeight;
                    const currentScroll = feed.scrollTop;
                    const currentCopy = Math.floor(currentScroll / oneSetHeight);
                    if (currentCopy !== 1) {
                        feed.scrollTop = (currentScroll % oneSetHeight) + oneSetHeight;
                    }
                }
            }, 200);
        });
    </script>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laura & Flo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #2D3B2D;
            --bg-card: #344034;
            --accent-pink: #D4728C;
            --accent-sage: #8FA98F;
            --text-cream: #F5F0EB;
            --text-mauve: #9B6B7A;
            --text-dim: rgba(245, 240, 235, 0.5);
            --transition-speed: 0.5s;
        }

        html.light-mode {
            --bg-dark: #F9F6F2;
            --bg-card: #FFFFFF;
            --accent-pink: #C4627C;
            --accent-sage: #5A8A5A;
            --text-cream: #2D3B2D;
            --text-mauve: #8B5A6A;
            --text-dim: rgba(45, 59, 45, 0.5);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-cream);
            transition: background var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        /* THEME TOGGLE */
        .theme-toggle {
            position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100;
            width: 44px; height: 44px; border-radius: 50%;
            border: 1px solid var(--accent-sage); background: rgba(143,169,143,0.1);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .theme-toggle:hover { transform: scale(1.1); background: rgba(143,169,143,0.2); }
        .theme-toggle:active { transform: scale(0.9); }
        .theme-toggle .icon-sun, .theme-toggle .icon-moon { position: absolute; transition: opacity 0.3s ease, transform 0.3s ease; }
        .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
        html.light-mode .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }
        html.light-mode .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }
        html.light-mode .theme-toggle { border-color: var(--accent-pink); background: rgba(212,114,140,0.08); }

        /* SAKURA BACKGROUND */
        .sakura-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .sakura-bg svg {
            position: absolute;
            opacity: 0.3;
            transition: transform 0.1s ease-out, opacity var(--transition-speed) ease;
        }
        html.light-mode .sakura-bg svg { opacity: 0.22; }
        .sakura-branch-tl { top: -3%; left: -3%; width: 55vw; max-width: 450px; }
        .sakura-branch-br { bottom: -3%; right: -3%; width: 55vw; max-width: 450px; transform: rotate(180deg); }
        .sakura-branch-tr { top: 5%; right: -5%; width: 30vw; max-width: 250px; transform: scaleX(-1); }
        .sakura-branch-bl { bottom: 8%; left: -5%; width: 30vw; max-width: 250px; transform: scaleX(-1) rotate(180deg); }

        /* PASSWORD */
        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            padding: 2rem; transition: opacity 0.6s ease, transform 0.6s ease, background var(--transition-speed) ease;
        }
        #password-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
        #password-overlay h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 0.5rem; color: var(--text-cream); text-align: center; }
        #password-overlay .subtitle { font-size: 0.9rem; color: var(--text-mauve); margin-bottom: 2.5rem; letter-spacing: 0.1em; text-transform: uppercase; }
        #password-form { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 320px; }
        #password-input { width: 100%; padding: 1rem 1.2rem; border: 1px solid var(--accent-sage); border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-cream); font-size: 1rem; font-family: 'Inter', sans-serif; text-align: center; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        html.light-mode #password-input { background: rgba(0,0,0,0.03); }
        #password-input:focus { border-color: var(--accent-pink); box-shadow: 0 0 20px rgba(212,114,140,0.15); }
        #password-input::placeholder { color: var(--text-dim); }
        #password-btn { width: 100%; padding: 1rem; border: none; border-radius: 12px; background: var(--accent-pink); color: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: transform 0.2s ease, background 0.3s ease; }
        #password-btn:hover { transform: scale(1.02); background: #c4627c; }
        #password-btn:active { transform: scale(0.98); }
        .password-error { color: var(--accent-pink); font-size: 0.85rem; opacity: 0; transition: opacity 0.3s ease; height: 1.2rem; }
        .password-error.visible { opacity: 1; }

        /* STORY FEED */
        #story-feed { display: none; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; transition: opacity 0.5s ease, transform 0.5s ease; }
        #story-feed.visible { display: block; }
        #story-feed.game-active { opacity: 0; transform: scale(0.95); pointer-events: none; }

        .story-card { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; position: relative; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .story-card.visible { opacity: 1; transform: translateY(0); }
        .story-card .context { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.2rem; text-align: center; max-width: 300px; }
        .story-card .quote { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 4.5vw, 1.6rem); line-height: 1.6; text-align: center; max-width: 600px; color: var(--text-cream); font-style: italic; position: relative; }
        .story-card .quote::before { content: '\201E'; position: absolute; top: -0.8rem; left: -0.5rem; font-size: 3rem; color: var(--accent-pink); opacity: 0.3; font-style: normal; }
        .story-card .attribution { margin-top: 2rem; text-align: center; }
        .story-card .attribution .name { font-size: 0.9rem; font-weight: 500; color: var(--accent-sage); }
        .story-card .attribution .relation { font-size: 0.75rem; color: var(--text-mauve); margin-top: 0.3rem; }
        .story-card::after { content: ''; position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); width: 30px; height: 4px; border-radius: 2px; background: var(--accent-sage); opacity: 0.2; }

        .story-card.finale .quote { font-size: clamp(1.8rem, 7vw, 3rem); font-style: normal; }
        .story-card.finale .quote::before { content: none; }
        .story-card.finale .sub-text { margin-top: 1.5rem; font-size: 1rem; color: var(--text-mauve); font-family: 'Playfair Display', serif; font-style: italic; }
        .story-card.finale .restart-btn { margin-top: 2.5rem; padding: 0.8rem 2rem; border: 1px solid var(--accent-sage); border-radius: 30px; background: rgba(143,169,143,0.1); color: var(--accent-sage); font-size: 0.85rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; pointer-events: auto; }
        .story-card.finale .restart-btn:hover { background: rgba(143,169,143,0.2); transform: scale(1.05); }

        /* TYPEWRITER */
        .typewriter-active .quote { overflow: hidden; }
        .typewriter-cursor { display: inline-block; width: 2px; height: 1.2em; background: var(--accent-pink); margin-left: 2px; vertical-align: text-bottom; animation: blink-cursor 0.7s step-end infinite; }
        @keyframes blink-cursor { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* BIRD EASTER EGG */
        .bird-easter-egg { position: absolute; bottom: 2.5rem; right: 1.5rem; font-size: 1.4rem; cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; opacity: 0.4; transition: opacity 0.3s ease, transform 0.1s ease; z-index: 5; }
        .bird-easter-egg:active { transform: scale(1.3); }
        .bird-easter-egg.wiggle { animation: bird-wiggle 0.3s ease; }
        @keyframes bird-wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }

        .scroll-hint { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); opacity: 0.4; animation: bounce 2s infinite; z-index: 10; pointer-events: none; transition: opacity 1s ease; }
        .scroll-hint.hidden { opacity: 0; }
        .scroll-hint svg { width: 24px; height: 24px; fill: var(--text-cream); }
        @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateX(-50%) translateY(0)} 40%{transform:translateX(-50%) translateY(-8px)} 60%{transform:translateX(-50%) translateY(-4px)} }

        @media (min-width: 768px) { .story-card { padding: 3rem 2rem; } .story-card .quote { max-width: 550px; } }
        .story-card:nth-child(odd) { background: radial-gradient(ellipse at top right, rgba(143,169,143,0.03) 0%, transparent 60%); }
        .story-card:nth-child(even) { background: radial-gradient(ellipse at bottom left, rgba(212,114,140,0.03) 0%, transparent 60%); }
        html.light-mode .story-card:nth-child(odd) { background: radial-gradient(ellipse at top right, rgba(143,169,143,0.06) 0%, transparent 60%); }
        html.light-mode .story-card:nth-child(even) { background: radial-gradient(ellipse at bottom left, rgba(212,114,140,0.06) 0%, transparent 60%); }

        /* GAME */
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: none; opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease; transform: scale(1.05); }
        #game-container.active { display: block; opacity: 1; transform: scale(1); }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #game-score { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); color: var(--text-cream); text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-top: 2rem; opacity: 0.9; }
        #game-start-screen, #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(45,59,45,0.85); pointer-events: auto; padding: 2rem; text-align: center; }
        #game-start-screen h2, #game-over-screen h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 6vw, 2.5rem); color: var(--text-cream); margin-bottom: 0.5rem; }
        .game-subtitle { font-size: 0.85rem; color: var(--text-mauve); margin-bottom: 1rem; letter-spacing: 0.05em; }
        .game-japanese { font-size: 1.2rem; color: var(--accent-sage); margin-bottom: 2rem; opacity: 0.8; }
        .game-instruction { font-size: 0.9rem; color: var(--text-dim); margin-top: 1rem; }
        .game-tap-btn { padding: 1rem 2.5rem; border: 1px solid var(--accent-pink); border-radius: 30px; background: rgba(212,114,140,0.15); color: var(--accent-pink); font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; pointer-events: auto; transition: background 0.3s ease, transform 0.2s ease; margin-top: 0.5rem; }
        .game-tap-btn:hover { background: rgba(212,114,140,0.3); transform: scale(1.05); }
        .game-tap-btn:active { transform: scale(0.95); }
        .game-back-btn { padding: 1rem 2.5rem; border: 1px solid var(--accent-sage); border-radius: 30px; background: rgba(143,169,143,0.15); color: var(--accent-sage); font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; pointer-events: auto; transition: background 0.3s ease, transform 0.2s ease; margin-top: 0.5rem; }
        .game-back-btn:hover { background: rgba(143,169,143,0.3); transform: scale(1.05); }
        #game-final-score { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 5rem); color: var(--accent-pink); margin: 1rem 0; }
        #game-high-score { font-size: 0.85rem; color: var(--accent-sage); margin-bottom: 2rem; }
        #game-over-screen { display: none; }

        @keyframes sakura-fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
        .sakura-petal-anim { position: fixed; width: 12px; height: 12px; background: var(--accent-pink); border-radius: 50% 0 50% 0; opacity: 0.6; z-index: 499; animation: sakura-fall linear forwards; pointer-events: none; }

        /* XBOX ACHIEVEMENTS */
        .achievement-popup {
            position: fixed; top: -130px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, #107C10 0%, #0e6b0e 50%, #1a8c1a 100%);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            min-width: 320px; max-width: 92vw;
            transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .achievement-popup.show { top: 1.5rem; }
        .achievement-popup.hiding { top: -130px; transition: top 0.4s ease-in; }
        .achievement-icon {
            width: 54px; height: 54px; border-radius: 4px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; flex-shrink: 0;
        }
        .achievement-content { display: flex; flex-direction: column; gap: 0.15rem; }
        .achievement-unlocked { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.7); font-weight: 600; }
        .achievement-title { font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 700; color: #FFFFFF; }
        .achievement-desc { font-size: 0.75rem; color: rgba(255,255,255,0.6); }
        .achievement-xp { font-size: 0.7rem; color: rgba(255,255,255,0.9); margin-top: 0.1rem; font-weight: 600; }
        .achievement-ding {
            position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
            background: #FFFFFF; border-radius: 50%;
            animation: ding-pulse 1.5s ease-out infinite;
        }
        @keyframes ding-pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>

        // ==========================================
        var achievementQueue=[],isShowingAchievement=false;
        function checkAchievements(){var ct=totalGameTime+sessionGameTime,ac=totalCrashes+sessionCrashes,h=new Date().getHours();ACHIEVEMENTS.forEach(function(a){if(unlockedAchievements.indexOf(a.id)!==-1)return;var u=false;if(a.timeRequired&&ct>=a.timeRequired)u=true;if(a.scoreRequired&&score>=a.scoreRequired)u=true;if(a.crashRequired&&ac>=a.crashRequired)u=true;if(a.quickDeathsRequired&&consecutiveCrashesUnder3>=a.quickDeathsRequired)u=true;if(a.gamesRequired&&totalGamesPlayed>=a.gamesRequired)u=true;if(a.special==='comeback'&&sessionCrashes>=5&&score>=10)u=true;if(a.special==='night'&&h>=2&&h<5)u=true;if(a.special==='persistence'&&immediateRetryCount>=10)u=true;if(u){unlockedAchievements.push(a.id);localStorage.setItem('flappy_tsuru_achievements',JSON.stringify(unlockedAchievements));queueAchievement(a);}});}
        function queueAchievement(a){achievementQueue.push(a);if(!isShowingAchievement)processQueue();}
        function processQueue(){if(achievementQueue.length===0){isShowingAchievement=false;return;}isShowingAchievement=true;var a=achievementQueue.shift();var p=document.getElementById('achievement-popup');document.getElementById('achievement-icon').textContent=a.icon;document.getElementById('achievement-title').textContent=a.title;document.getElementById('achievement-desc').textContent=a.desc;document.getElementById('achievement-xp').textContent=a.g+'G';p.classList.remove('hiding');p.classList.add('show');if(navigator.vibrate)navigator.vibrate([50,30,50]);setTimeout(function(){p.classList.remove('show');p.classList.add('hiding');setTimeout(processQueue,500);},4000);}
        function updateGameTimer(){sessionGameTime=Math.floor((Date.now()-gameStartTime)/1000);checkAchievements();}

        // ==========================================
        // STORY FEED
        // ==========================================
        function buildCards(){feed.innerHTML='';stories.forEach(function(s,i){var c=document.createElement('div');c.className='story-card';c.dataset.index=i;var h='';if(s.context)h+='<p class="context">'+s.context+'</p>';h+='<p class="quote">'+s.quote+'</p>';h+='<div class="attribution"><p class="name">'+s.name+'</p><p class="relation">'+s.relation+'</p></div>';c.innerHTML=h;feed.appendChild(c);});var f=document.createElement('div');f.className='story-card finale';f.innerHTML='<p class="quote">Auf euer Abenteuer. 🥂</p><p class="sub-text">Habt ganz viel Spaß in Japan und genießt eure Flitterwochen! ✈️✨</p><button class="restart-btn" id="restart-btn">↑ Nochmal von vorne</button><div class="bird-easter-egg" id="bird-easter-egg">🕊️</div>';feed.appendChild(f);}
        function setupObserver(){var first=false;var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');if(!first&&e.target.dataset.index==='0'){first=true;playTypewriter(e.target);}}else{e.target.classList.remove('visible');}});},{threshold:0.3});document.querySelectorAll('.story-card').forEach(function(c){obs.observe(c);});}
        function setupRestart(){document.getElementById('restart-btn').addEventListener('click',function(){feed.scrollTo({top:0,behavior:'smooth'});});}
        function setupBirdEasterEgg(){var b=document.getElementById('bird-easter-egg');if(!b)return;b.addEventListener('click',function(e){e.preventDefault();e.stopPropagation();birdTapCount++;clearTimeout(birdTapTimeout);b.classList.remove('wiggle');void b.offsetWidth;b.classList.add('wiggle');if(birdTapCount>=3)b.style.opacity=Math.min(0.4+(birdTapCount-2)*0.15,1);birdTapTimeout=setTimeout(function(){birdTapCount=0;b.style.opacity='0.4';},BIRD_TAP_WINDOW);if(birdTapCount>=BIRD_TAPS_REQUIRED){birdTapCount=0;b.style.opacity='0.4';showGame();}});}
        function unlock(){overlay.classList.add('hidden');feed.classList.add('visible');scrollHint.style.display='block';setTimeout(function(){setupObserver();setupRestart();setupBirdEasterEgg();},100);feed.addEventListener('scroll',function(){scrollHint.classList.add('hidden');},{once:true});document.addEventListener('keydown',function(e){if(e.key==='g'||e.key==='G')toggleGame();});}

        // ==========================================
        // GAME
        // ==========================================
        function toggleGame(){if(gameActive)hideGame();else showGame();}
        function showGame(){gameActive=true;spawnSakuraPetals();var c=document.getElementById('game-container');c.style.display='block';feed.classList.add('game-active');setTimeout(function(){c.classList.add('active');},10);initGame();}
        function hideGame(){gameActive=false;var c=document.getElementById('game-container');c.classList.remove('active');feed.classList.remove('game-active');if(gameStartTime>0){totalGameTime+=sessionGameTime;localStorage.setItem('flappy_tsuru_total_time',totalGameTime.toString());sessionGameTime=0;}if(gameTimerInterval){clearInterval(gameTimerInterval);gameTimerInterval=null;}setTimeout(function(){c.style.display='none';stopGame();},500);}
        function spawnSakuraPetals(){for(var i=0;i<20;i++){var p=document.createElement('div');p.className='sakura-petal-anim';p.style.left=Math.random()*100+'vw';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()+'s';p.style.width=(8+Math.random()*10)+'px';p.style.height=p.style.width;document.body.appendChild(p);(function(el){setTimeout(function(){el.remove();},5000);})(p);}}
        function resizeCanvas(){canvas.width=window.innerWidth*window.devicePixelRatio;canvas.height=window.innerHeight*window.devicePixelRatio;ctx.setTransform(window.devicePixelRatio,0,0,window.devicePixelRatio,0,0);}
        function initGame(){resizeCanvas();window.addEventListener('resize',resizeCanvas);gameState='start';score=0;scoreDisplay.textContent='0';startScreen.style.display='flex';overScreen.style.display='none';crane={x:window.innerWidth*0.25,y:window.innerHeight*0.45,velocity:0,rotation:0,flapFrame:0};pipes=[];particles=[];clouds=generateClouds();bgOffset=0;frameCount=0;drawFrame();canvas.addEventListener('touchstart',handleGameTap);canvas.addEventListener('mousedown',handleGameTap);document.getElementById('game-start-btn').addEventListener('click',startPlaying);document.getElementById('game-retry-btn').addEventListener('click',retryGame);document.getElementById('game-back-btn').addEventListener('click',hideGame);}
        function stopGame(){if(gameLoop){cancelAnimationFrame(gameLoop);gameLoop=null;}canvas.removeEventListener('touchstart',handleGameTap);canvas.removeEventListener('mousedown',handleGameTap);}
        function startPlaying(){gameState='playing';startScreen.style.display='none';crane.velocity=FLAP_FORCE;crane.flapFrame=10;gameStartTime=Date.now();sessionGameTime=0;sessionCrashes=0;totalGamesPlayed++;localStorage.setItem('flappy_tsuru_games_played',totalGamesPlayed.toString());if(gameTimerInterval)clearInterval(gameTimerInterval);gameTimerInterval=setInterval(updateGameTimer,1000);checkAchievements();runGameLoop();}
        function retryGame(){if(gameStartTime>0){totalGameTime+=sessionGameTime;localStorage.setItem('flappy_tsuru_total_time',totalGameTime.toString());}immediateRetryCount++;localStorage.setItem('flappy_tsuru_retries',immediateRetryCount.toString());totalGamesPlayed++;localStorage.setItem('flappy_tsuru_games_played',totalGamesPlayed.toString());overScreen.style.display='none';score=0;scoreDisplay.textContent='0';crane={x:window.innerWidth*0.25,y:window.innerHeight*0.45,velocity:0,rotation:0,flapFrame:0};pipes=[];particles=[];frameCount=0;gameState='playing';crane.velocity=FLAP_FORCE;crane.flapFrame=10;gameStartTime=Date.now();sessionGameTime=0;if(gameTimerInterval)clearInterval(gameTimerInterval);gameTimerInterval=setInterval(updateGameTimer,1000);checkAchievements();runGameLoop();}
        function handleGameTap(e){e.preventDefault();if(gameState==='playing'){crane.velocity=FLAP_FORCE;crane.flapFrame=10;for(var i=0;i<3;i++)particles.push({x:crane.x-5,y:crane.y+5,vx:-Math.random()*2-1,vy:Math.random()*2-1,life:20,maxLife:20,color:'#F5F0EB'});}}
        function generateClouds(){var c=[],w=window.innerWidth,h=window.innerHeight;for(var i=0;i<6;i++)c.push({x:Math.random()*w*1.5,y:Math.random()*h*0.4,width:60+Math.random()*80,speed:0.3+Math.random()*0.5,opacity:0.1+Math.random()*0.15});return c;}
        function runGameLoop(){function loop(){if(gameState!=='playing')return;update();drawFrame();gameLoop=requestAnimationFrame(loop);}gameLoop=requestAnimationFrame(loop);}
        function update(){frameCount++;var w=window.innerWidth,h=window.innerHeight;crane.velocity+=GRAVITY;crane.y+=crane.velocity;crane.rotation=Math.min(Math.max(crane.velocity*3,-30),70);if(crane.flapFrame>0)crane.flapFrame--;bgOffset+=PIPE_SPEED*0.3;clouds.forEach(function(c){c.x-=c.speed;if(c.x+c.width<0){c.x=w+Math.random()*100;c.y=Math.random()*h*0.4;}});if(frameCount%PIPE_INTERVAL===0)pipes.push({x:w+PIPE_WIDTH,gapY:100+Math.random()*(h-250),scored:false});pipes.forEach(function(p){p.x-=PIPE_SPEED;if(!p.scored&&p.x+PIPE_WIDTH<crane.x){p.scored=true;score++;scoreDisplay.textContent=score;checkAchievements();for(var i=0;i<5;i++)particles.push({x:crane.x+20,y:crane.y,vx:Math.random()*3,vy:-Math.random()*3-1,life:30,maxLife:30,color:'#D4728C'});}});pipes=pipes.filter(function(p){return p.x+PIPE_WIDTH>-50;});particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;});particles=particles.filter(function(p){return p.life>0;});if(frameCount%40===0)particles.push({x:w+10,y:Math.random()*h*0.6,vx:-PIPE_SPEED-Math.random(),vy:0.5+Math.random(),life:200,maxLife:200,color:Math.random()>0.5?'#E88AA3':'#F0D0C0',isSakura:true,rot:Math.random()*360});if(crane.y<0||crane.y>h-50){gameOver();return;}for(var i=0;i<pipes.length;i++){var p=pipes[i];if(crane.x+CRANE_SIZE>p.x&&crane.x-CRANE_SIZE<p.x+PIPE_WIDTH){if(crane.y-CRANE_SIZE<p.gapY-PIPE_GAP/2||crane.y+CRANE_SIZE>p.gapY+PIPE_GAP/2){gameOver();return;}}}}
        function gameOver(){gameState='over';sessionCrashes++;totalCrashes++;localStorage.setItem('flappy_tsuru_crashes',totalCrashes.toString());if(score===0){consecutiveCrashesUnder3++;localStorage.setItem('flappy_tsuru_quick_deaths',consecutiveCrashesUnder3.toString());}else{consecutiveCrashesUnder3=0;localStorage.setItem('flappy_tsuru_quick_deaths','0');}if(gameStartTime>0){totalGameTime+=sessionGameTime;localStorage.setItem('flappy_tsuru_total_time',totalGameTime.toString());sessionGameTime=0;}if(gameTimerInterval){clearInterval(gameTimerInterval);gameTimerInterval=null;}if(score>highScore){highScore=score;localStorage.setItem('flappy_tsuru_high',highScore.toString());}finalScoreDisplay.textContent=score;highScoreDisplay.textContent='\u6700\u9AD8\u8A18\u9332: '+highScore;overScreen.style.display='flex';if(navigator.vibrate)navigator.vibrate(100);checkAchievements();}
        function drawFrame(){var w=window.innerWidth,h=window.innerHeight;ctx.clearRect(0,0,w,h);var sg=ctx.createLinearGradient(0,0,0,h);sg.addColorStop(0,'#1a1a2e');sg.addColorStop(0.3,'#2D3B2D');sg.addColorStop(0.7,'#344034');sg.addColorStop(1,'#1a2a1a');ctx.fillStyle=sg;ctx.fillRect(0,0,w,h);ctx.beginPath();ctx.arc(w*0.8,h*0.12,30,0,Math.PI*2);ctx.fillStyle='rgba(245,240,235,0.15)';ctx.fill();clouds.forEach(function(c){ctx.beginPath();ctx.ellipse(c.x,c.y,c.width/2,15,0,0,Math.PI*2);ctx.fillStyle='rgba(143,169,143,'+c.opacity+')';ctx.fill();});drawSkyline(w,h);drawFuji(w,h);particles.filter(function(p){return p.isSakura;}).forEach(function(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate((p.rot+frameCount*2)*Math.PI/180);ctx.beginPath();ctx.ellipse(0,0,5,3,0,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.life/p.maxLife*0.5;ctx.fill();ctx.restore();});drawGround(w,h);pipes.forEach(function(p){drawTorii(p,h);});drawCrane();particles.filter(function(p){return !p.isSakura;}).forEach(function(p){ctx.beginPath();ctx.arc(p.x,p.y,3*(p.life/p.maxLife),0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.life/p.maxLife;ctx.fill();ctx.globalAlpha=1;});}
        function drawSkyline(w,h){var by=h-50;ctx.fillStyle='rgba(30,45,30,0.4)';var o=-(bgOffset*0.2)%w;[{x:0,w:30,h:80},{x:40,w:20,h:120},{x:70,w:35,h:60},{x:110,w:15,h:150},{x:135,w:25,h:90},{x:170,w:40,h:70},{x:220,w:12,h:180},{x:240,w:30,h:100},{x:280,w:20,h:130},{x:310,w:35,h:75},{x:355,w:18,h:160},{x:380,w:25,h:95}].forEach(function(b){var bx=((b.x+o)%(w+100));if(bx<-50)bx+=w+100;ctx.fillRect(bx,by-b.h,b.w,b.h);});}
        function drawFuji(w,h){var fx=w*0.6-(bgOffset*0.05)%(w*0.3),fy=h*0.55;ctx.beginPath();ctx.moveTo(fx-120,fy+40);ctx.lineTo(fx,fy-60);ctx.lineTo(fx+120,fy+40);ctx.closePath();ctx.fillStyle='rgba(60,80,60,0.2)';ctx.fill();ctx.beginPath();ctx.moveTo(fx-30,fy-35);ctx.lineTo(fx,fy-60);ctx.lineTo(fx+30,fy-35);ctx.closePath();ctx.fillStyle='rgba(245,240,235,0.15)';ctx.fill();}
        function drawGround(w,h){var gy=h-50;var gg=ctx.createLinearGradient(0,gy,0,h);gg.addColorStop(0,'#2a3a2a');gg.addColorStop(1,'#1a2a1a');ctx.fillStyle=gg;ctx.fillRect(0,gy,w,50);ctx.strokeStyle='rgba(143,169,143,0.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();}
        function drawTorii(pipe,h){var tH=pipe.gapY-PIPE_GAP/2,bY=pipe.gapY+PIPE_GAP/2,bH=h-50-bY,x=pipe.x,pw=PIPE_WIDTH;ctx.fillStyle='#C4424B';ctx.fillRect(x+5,0,10,tH);ctx.fillRect(x+pw-15,0,10,tH);ctx.fillStyle='#8B2020';ctx.fillRect(x-8,tH-12,pw+16,12);ctx.fillStyle='#C4424B';ctx.fillRect(x-5,tH-22,pw+10,12);ctx.fillStyle='#D4A84B';ctx.fillRect(x-5,tH-24,pw+10,3);ctx.fillStyle='#C4424B';ctx.fillRect(x+5,bY,10,bH);ctx.fillRect(x+pw-15,bY,10,bH);ctx.fillStyle='#8B2020';ctx.fillRect(x-8,bY,pw+16,12);ctx.fillStyle='#C4424B';ctx.fillRect(x-5,bY+10,pw+10,12);ctx.fillStyle='#D4A84B';ctx.fillRect(x-5,bY+22,pw+10,3);}
        function drawCrane(){ctx.save();ctx.translate(crane.x,crane.y);ctx.rotate(crane.rotation*Math.PI/180);ctx.fillStyle='#F5F0EB';ctx.beginPath();ctx.ellipse(0,0,CRANE_SIZE,CRANE_SIZE*0.55,0,0,Math.PI*2);ctx.fill();var wa=crane.flapFrame>0?-25:10;ctx.save();ctx.rotate(wa*Math.PI/180);ctx.fillStyle='#E0D8D0';ctx.beginPath();ctx.ellipse(-5,-5,CRANE_SIZE*0.7,CRANE_SIZE*0.3,-0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2D3B2D';ctx.beginPath();ctx.ellipse(-15,-8,CRANE_SIZE*0.3,CRANE_SIZE*0.15,-0.3,0,Math.PI*2);ctx.fill();ctx.restore();ctx.strokeStyle='#F5F0EB';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(CRANE_SIZE*0.5,-3);ctx.quadraticCurveTo(CRANE_SIZE*0.8,-10,CRANE_SIZE*0.9,-15);ctx.stroke();ctx.fillStyle='#F5F0EB';ctx.beginPath();ctx.arc(CRANE_SIZE*0.9,-16,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#D4728C';ctx.beginPath();ctx.arc(CRANE_SIZE*0.9,-20,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#D4A84B';ctx.beginPath();ctx.moveTo(CRANE_SIZE*0.9+6,-16);ctx.lineTo(CRANE_SIZE*0.9+14,-15);ctx.lineTo(CRANE_SIZE*0.9+6,-14);ctx.closePath();ctx.fill();ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(CRANE_SIZE*0.92,-16,1.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#2D3B2D';ctx.beginPath();ctx.moveTo(-CRANE_SIZE*0.7,0);ctx.lineTo(-CRANE_SIZE*1.1,-8);ctx.lineTo(-CRANE_SIZE*0.9,-2);ctx.lineTo(-CRANE_SIZE*1.2,-3);ctx.lineTo(-CRANE_SIZE*0.8,3);ctx.closePath();ctx.fill();ctx.restore();}

        // ==========================================
        // INIT
        // ==========================================
        // Store base transforms for parallax
        document.querySelectorAll('.sakura-bg svg').forEach(function(s) {
            var ct = window.getComputedStyle(s).transform;
            s.setAttribute('data-base-transform', ct === 'none' ? '' : ct);
            // Use CSS transform as base
            var cls = s.className.baseVal || '';
            if (cls.indexOf('sakura-branch-br') !== -1) s.setAttribute('data-base-transform', 'rotate(180deg)');
            else if (cls.indexOf('sakura-branch-tr') !== -1) s.setAttribute('data-base-transform', 'scaleX(-1)');
            else if (cls.indexOf('sakura-branch-bl') !== -1) s.setAttribute('data-base-transform', 'scaleX(-1) rotate(180deg)');
            else s.setAttribute('data-base-transform', '');
        });

        buildCards();
        initGyroscope();
        if(localStorage.getItem(STORAGE_KEY)===CORRECT_PASSWORD)unlock();else scrollHint.style.display='none';
        passwordBtn.addEventListener('click',function(){var pw=passwordInput.value.trim();if(pw===CORRECT_PASSWORD){localStorage.setItem(STORAGE_KEY,pw);unlock();}else{passwordError.classList.add('visible');passwordInput.style.borderColor='var(--accent-pink)';setTimeout(function(){passwordError.classList.remove('visible');passwordInput.style.borderColor='';},2000);}});
        passwordInput.addEventListener('keydown',function(e){if(e.key==='Enter')passwordBtn.click();});
    </script>
</body>


<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laura & Flo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #2D3B2D;
            --bg-card: #344034;
            --accent-pink: #D4728C;
            --accent-sage: #8FA98F;
            --text-cream: #F5F0EB;
            --text-mauve: #9B6B7A;
            --text-dim: rgba(245, 240, 235, 0.5);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-cream);
        }

        .flower-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.12;
            overflow: hidden;
        }

        .flower-bg svg { position: absolute; }

        .flower-top-left { top: -5%; left: -5%; width: 45vw; max-width: 350px; transform: rotate(-5deg); }
        .flower-bottom-right { bottom: -5%; right: -5%; width: 45vw; max-width: 350px; transform: rotate(175deg); }
        .flower-top-right { top: 5%; right: -2%; width: 25vw; max-width: 180px; transform: rotate(15deg); }
        .flower-bottom-left { bottom: 8%; left: -3%; width: 25vw; max-width: 180px; transform: rotate(-20deg); }

        #password-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            padding: 2rem; transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #password-overlay.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
        #password-overlay h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 0.5rem; color: var(--text-cream); text-align: center; }
        #password-overlay .subtitle { font-size: 0.9rem; color: var(--text-mauve); margin-bottom: 2.5rem; letter-spacing: 0.1em; text-transform: uppercase; }

        #password-form { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 320px; }
        #password-input { width: 100%; padding: 1rem 1.2rem; border: 1px solid var(--accent-sage); border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--text-cream); font-size: 1rem; font-family: 'Inter', sans-serif; text-align: center; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
        #password-input:focus { border-color: var(--accent-pink); box-shadow: 0 0 20px rgba(212,114,140,0.15); }
        #password-input::placeholder { color: var(--text-dim); }
        #password-btn { width: 100%; padding: 1rem; border: none; border-radius: 12px; background: var(--accent-pink); color: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: transform 0.2s ease, background 0.3s ease; }
        #password-btn:hover { transform: scale(1.02); background: #c4627c; }
        #password-btn:active { transform: scale(0.98); }
        .password-error { color: var(--accent-pink); font-size: 0.85rem; opacity: 0; transition: opacity 0.3s ease; height: 1.2rem; }
        .password-error.visible { opacity: 1; }

        #story-feed { display: none; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; transition: opacity 0.5s ease, transform 0.5s ease; }
        #story-feed.visible { display: block; }
        #story-feed.game-active { opacity: 0; transform: scale(0.95); pointer-events: none; }

        .story-card { height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; position: relative; opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .story-card.visible { opacity: 1; transform: translateY(0); }
        .story-card .context { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1.2rem; text-align: center; max-width: 300px; font-weight: 400; }
        .story-card .quote { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 4.5vw, 1.6rem); line-height: 1.6; text-align: center; max-width: 600px; color: var(--text-cream); font-style: italic; position: relative; }
        .story-card .quote::before { content: '„'; position: absolute; top: -0.8rem; left: -0.5rem; font-size: 3rem; color: var(--accent-pink); opacity: 0.3; font-style: normal; }
        .story-card .attribution { margin-top: 2rem; text-align: center; }
        .story-card .attribution .name { font-size: 0.9rem; font-weight: 500; color: var(--accent-sage); }
        .story-card .attribution .relation { font-size: 0.75rem; color: var(--text-mauve); margin-top: 0.3rem; }
        .story-card::after { content: ''; position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); width: 30px; height: 4px; border-radius: 2px; background: var(--accent-sage); opacity: 0.2; }

        .story-card.finale .quote { font-size: clamp(1.8rem, 7vw, 3rem); font-style: normal; }
        .story-card.finale .quote::before { content: none; }
        .story-card.finale .sub-text { margin-top: 1.5rem; font-size: 1rem; color: var(--text-mauve); font-family: 'Playfair Display', serif; font-style: italic; }
        .story-card.finale .restart-btn { margin-top: 2.5rem; padding: 0.8rem 2rem; border: 1px solid var(--accent-sage); border-radius: 30px; background: rgba(143,169,143,0.1); color: var(--accent-sage); font-size: 0.85rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.3s ease, transform 0.2s ease; pointer-events: auto; }
        .story-card.finale .restart-btn:hover { background: rgba(143,169,143,0.2); transform: scale(1.05); }
        .story-card.finale .restart-btn:active { transform: scale(0.95); }

        /* Bird Easter Egg Icon */
        .bird-easter-egg {
            position: absolute;
            bottom: 2.5rem;
            right: 1.5rem;
            font-size: 1.4rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            opacity: 0.4;
            transition: opacity 0.3s ease, transform 0.1s ease;
            z-index: 5;
        }
        .bird-easter-egg:active {
            transform: scale(1.3);
        }
        .bird-easter-egg.wiggle {
            animation: bird-wiggle 0.3s ease;
        }
        @keyframes bird-wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        .scroll-hint { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); opacity: 0.4; animation: bounce 2s infinite; z-index: 10; pointer-events: none; transition: opacity 1s ease; }
        .scroll-hint.hidden { opacity: 0; }
        .scroll-hint svg { width: 24px; height: 24px; fill: var(--text-cream); }
        @keyframes bounce { 0%,20%,50%,80%,100%{transform:translateX(-50%) translateY(0)} 40%{transform:translateX(-50%) translateY(-8px)} 60%{transform:translateX(-50%) translateY(-4px)} }

        @media (min-width: 768px) { .story-card { padding: 3rem 2rem; } .story-card .quote { max-width: 550px; } }
        .story-card:nth-child(odd) { background: radial-gradient(ellipse at top right, rgba(143,169,143,0.03) 0%, transparent 60%); }
        .story-card:nth-child(even) { background: radial-gradient(ellipse at bottom left, rgba(212,114,140,0.03) 0%, transparent 60%); }

        /* FLAPPY CRANE GAME */
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: none; opacity: 0; transition: opacity 0.5s ease, transform 0.5s ease; transform: scale(1.05); }
        #game-container.active { display: block; opacity: 1; transform: scale(1); }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #game-score { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 8vw, 4rem); color: var(--text-cream); text-shadow: 0 2px 10px rgba(0,0,0,0.5); margin-top: 2rem; opacity: 0.9; }
        #game-start-screen, #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(45,59,45,0.85); pointer-events: auto; padding: 2rem; text-align: center; }
        #game-start-screen h2, #game-over-screen h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 6vw, 2.5rem); color: var(--text-cream); margin-bottom: 0.5rem; }
        .game-subtitle { font-size: 0.85rem; color: var(--text-mauve); margin-bottom: 1rem; letter-spacing: 0.05em; }
        .game-japanese { font-size: 1.2rem; color: var(--accent-sage); margin-bottom: 2rem; opacity: 0.8; }
        .game-instruction { font-size: 0.9rem; color: var(--text-dim); margin-top: 1rem; }
        .game-tap-btn { padding: 1rem 2.5rem; border: 1px solid var(--accent-pink); border-radius: 30px; background: rgba(212,114,140,0.15); color: var(--accent-pink); font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; pointer-events: auto; transition: background 0.3s ease, transform 0.2s ease; margin-top: 0.5rem; }
        .game-tap-btn:hover { background: rgba(212,114,140,0.3); transform: scale(1.05); }
        .game-tap-btn:active { transform: scale(0.95); }
        .game-back-btn { padding: 1rem 2.5rem; border: 1px solid var(--accent-sage); border-radius: 30px; background: rgba(143,169,143,0.15); color: var(--accent-sage); font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; pointer-events: auto; transition: background 0.3s ease, transform 0.2s ease; margin-top: 0.5rem; }
        .game-back-btn:hover { background: rgba(143,169,143,0.3); transform: scale(1.05); }
        .game-back-btn:active { transform: scale(0.95); }
        #game-final-score { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 5rem); color: var(--accent-pink); margin: 1rem 0; }
        #game-high-score { font-size: 0.85rem; color: var(--accent-sage); margin-bottom: 2rem; }
        #game-over-screen { display: none; }

        @keyframes sakura-fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
        .sakura-petal { position: fixed; width: 12px; height: 12px; background: var(--accent-pink); border-radius: 50% 0 50% 0; opacity: 0.6; z-index: 499; animation: sakura-fall linear forwards; pointer-events: none; }
    </style>
</head>

    <div id="password-overlay">
        <h1>Laura & Flo</h1>
        <p class="subtitle">Ein Geschenk in Worten</p>
        <form id="password-form" onsubmit="return false;">
            <input type="password" id="password-input" placeholder="Passwort eingeben" autocomplete="off">
            <button type="submit" id="password-btn">Eintreten</button>
            <p class="password-error" id="password-error">Falsches Passwort</p>
        </form>
    </div>

    <div class="scroll-hint" id="scroll-hint">
        <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
    </div>

    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="game-ui">
            <div id="game-score">0</div>
            <div id="game-start-screen">
                <h2>Flappy Tsuru</h2>
                <p class="game-subtitle">フラッピー鶴</p>
                <p class="game-japanese">東京へようこそ ✈️</p>
                <button class="game-tap-btn" id="game-start-btn">Tippe zum Fliegen</button>
                <p class="game-instruction">Navigiere den Kranich durch die Torii-Tore</p>
            </div>
            <div id="game-over-screen">
                <h2>お疲れ様!</h2>
                <p class="game-subtitle">Gute Reise nach Tokio!</p>
                <div id="game-final-score">0</div>
                <p id="game-high-score">Highscore: 0</p>
                <button class="game-tap-btn" id="game-retry-btn">もう一回</button>
                <button class="game-back-btn" id="game-back-btn">💌 Zurück zum Feed</button>
            </div>
        </div>
    </div>

    <div id="story-feed"></div>

    <script>
        // ==========================================
        // ALL VARIABLES DECLARED FIRST
        // ==========================================
        var CORRECT_PASSWORD = 'lauraundflo4ever';
        var STORAGE_KEY = 'flo_laura_auth';

        // Bird Easter Egg tap detection
        var birdTapCount = 0;
        var birdTapTimeout = null;
        var BIRD_TAPS_REQUIRED = 5;
        var BIRD_TAP_WINDOW = 2500; // 2.5 seconds

        // Game state
        var gameActive = false;
        var gameLoop = null;
        var gameState = 'start';
        var score = 0;
        var highScore = parseInt(localStorage.getItem('flappy_tsuru_high') || '0');
        var crane = { x: 0, y: 0, velocity: 0, rotation: 0, flapFrame: 0 };
        var pipes = [];
        var particles = [];
        var clouds = [];
        var bgOffset = 0;
        var frameCount = 0;

        // Game constants
        var GRAVITY = 0.45;
        var FLAP_FORCE = -7.5;
        var PIPE_SPEED = 2.8;
        var PIPE_GAP = 160;
        var PIPE_WIDTH = 55;
        var PIPE_INTERVAL = 110;
        var CRANE_SIZE = 28;

        // Story data
        var stories = [
            { quote: "Seit Laura in Florians Leben ist, redet er immerhin mit mir. Und er hat festgestellt, dass ich eigentlich auch ganz cool bin.", name: "Pia", relation: "Kleine Schwester" },
            { quote: "TM-Vorlesung, Grundsemester. Flo kommt viel zu spät, läuft rein, völlig verschossen, hockt sich hin, dreht sich einmal kurz um – und pennt ein. Anderthalb Stunden. Komplett durch.", name: "Nico", relation: "Studienfreund" },
            { quote: "Wenn sie zusammen sind, haben sie so ein Strahlen im Gesicht.", name: "Simone", relation: "Patentante" },
            { quote: "Ich habe Flo mit zwei Jahren in die Schiffstraße mitgenommen – eine Raucherkneipe. Er saß an der Theke und hat Marmor getrunken. Zuhause ist Susanne durchgedreht, weil er nach Rauch gestunken hat.", name: "Julia / Tante Rossa", relation: "Tante" },
            { quote: "Laura habe ich zum ersten Mal auf einer Demo in Freiburg kennengelernt. Da habe ich schon ihr radikales Potenzial erkannt.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Florian ist der hilfsbereiteste Freund, den ich habe. Wenn man ihn anruft, ist er sofort zur Stelle – ausnahmslos in bester Laune und übersprudelnder Energie.", name: "Ivo", relation: "Arbeitskollege" },
            { quote: "Florian hat mit China-Böllern rumexperimentiert und versucht, das Klassenzimmer im M-Bau in die Luft zu jagen. Gab mies Nachsitzen.", name: "Kai", relation: "Schulfreund" },
            { quote: "Flo gibt nach außen den Ton an – aber niemand wahrnimmt, was Laura eigentlich monatelang im Hintergrund still und heimlich alles macht.", name: "Leonie", relation: "Schwester" },
            { context: "Über die Kindheit:", quote: "Eine der ersten Erinnerungen sind die Übernachtungsparties. Wir haben teilweise bis spät in die Nacht das Brettspiel Carcassonne unter der Bettdecke gespielt.", name: "Max", relation: "Trauzeuge" },
            { quote: "Flo? Der Techno-Wikinger. Laura? Merida – die Prinzessin, die lieber Kriegerin wird.", name: "Louis", relation: "Bester Freund von Laura" },
            { quote: "Flo ist besonders gefährlich, sobald ihm was richtig gut gefällt.", name: "Moritz", relation: "Freund seit Jugend" },
            { quote: "Ich habe ihn ganz oft verkleidet – mit Ohrringen und Kleidchen. Er wollte es aber auch.", name: "Julia / Tante Rossa", relation: "Tante" },
            { context: "Über die beiden:", quote: "Chaotisch, strukturiert, liebevoll, positiv. Sie ergänzen sich auf ganz weirde Arten. Sie haben beide ein Herz aus Gold und eine positive Energie – das ist auch das, was ihr Umfeld an den beiden schätzt.", name: "Bella", relation: "Schwester & Trauzeugin" },
            { quote: "Flo war eine der wichtigsten Personen für mich im Studium, weil er uns alle immer vom Stress runtergeholt hat. Sein Motto: ‚Macht euch keinen Stress, es wird easy.' Und irgendwie hatte er jedes Mal recht.", name: "Nico", relation: "Studienfreund" },
            { context: "Erinnerung an die Kindheit:", quote: "Laura und ich saßen kurz vor dem Abitur in der noch nicht umgebauten Küche bei meinen Eltern auf dem Boden. Absolute Nervenbündel, heulend auf dem Küchenboden. Klingt total doof zusammen zu heulen – aber irgendwie ist der Moment trotzdem voll in positiver Erinnerung bei mir abgespeichert.", name: "Leonie", relation: "Schwester" },
            { quote: "50km-Marsch. Ohne Training. Die letzten Kilometer wie Zombies. Ich danach mit Belastungsbruch. Florian mit der größten Blase der Geschichte.", name: "Ivo", relation: "Arbeitskollege" },
            { context: "Auf die Frage, was typisch für die beiden ist:", quote: "Katzen. Japan. Und eine kleine Brise strukturiertes Chaos – liebevolles Chaos.", name: "Pia", relation: "Kleine Schwester" },
            { context: "Über Flo:", quote: "Flo war für mich immer eine Stütze. Jemand, wo ich wirklich wusste: Der ist einen Anruf entfernt, egal was los ist.", name: "Max", relation: "Trauzeuge" },

        // ==========================================
        // DOM REFERENCES
        // ==========================================
        var feed = document.getElementById('story-feed');
        var overlay = document.getElementById('password-overlay');
        var passwordInput = document.getElementById('password-input');
        var passwordBtn = document.getElementById('password-btn');
        var passwordError = document.getElementById('password-error');
        var scrollHint = document.getElementById('scroll-hint');
        var canvas = document.getElementById('game-canvas');
        var ctx = canvas.getContext('2d');
        var scoreDisplay = document.getElementById('game-score');
        var startScreen = document.getElementById('game-start-screen');
        var overScreen = document.getElementById('game-over-screen');
        var finalScoreDisplay = document.getElementById('game-final-score');
        var highScoreDisplay = document.getElementById('game-high-score');

        // ==========================================
        // STORY FEED FUNCTIONS
        // ==========================================
        function buildCards() {
            feed.innerHTML = '';
            stories.forEach(function(story, index) {
                var card = document.createElement('div');
                card.className = 'story-card';
                card.dataset.index = index;
                var html = '';
                if (story.context) html += '<p class="context">' + story.context + '</p>';
                html += '<p class="quote">' + story.quote + '</p>';
                html += '<div class="attribution"><p class="name">' + story.name + '</p><p class="relation">' + story.relation + '</p></div>';
                card.innerHTML = html;
                feed.appendChild(card);
            });
            var finale = document.createElement('div');
            finale.className = 'story-card finale';
            finale.innerHTML = '<p class="quote">Auf euer Abenteuer. 🥂</p><p class="sub-text">Habt ganz viel Spaß in Japan und genießt eure Flitterwochen! ✈️✨</p><button class="restart-btn" id="restart-btn">↑ Nochmal von vorne</button><div class="bird-easter-egg" id="bird-easter-egg">🕊️</div>';
            feed.appendChild(finale);
        }

        function setupObserver() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                    else entry.target.classList.remove('visible');
                });
            }, { threshold: 0.3 });
            document.querySelectorAll('.story-card').forEach(function(card) { observer.observe(card); });
        }

        function setupRestart() {
            document.getElementById('restart-btn').addEventListener('click', function() {
                feed.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ==========================================
        // BIRD EASTER EGG - MULTI TAP TRIGGER
        // ==========================================
        function setupBirdEasterEgg() {
            var birdIcon = document.getElementById('bird-easter-egg');
            if (!birdIcon) return;

            birdIcon.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                birdTapCount++;
                clearTimeout(birdTapTimeout);

                // Visual feedback: wiggle animation
                birdIcon.classList.remove('wiggle');
                void birdIcon.offsetWidth; // Force reflow
                birdIcon.classList.add('wiggle');

                // Increase opacity as hint when getting closer
                if (birdTapCount >= 3) {
                    birdIcon.style.opacity = Math.min(0.4 + (birdTapCount - 2) * 0.15, 1);
                }

                // Reset after time window
                birdTapTimeout = setTimeout(function() {
                    birdTapCount = 0;
                    birdIcon.style.opacity = '0.4';
                }, BIRD_TAP_WINDOW);

                // Launch game!
                if (birdTapCount >= BIRD_TAPS_REQUIRED) {
                    birdTapCount = 0;
                    birdIcon.style.opacity = '0.4';
                    showGame();
                }
            });
        }

        function unlock() {
            overlay.classList.add('hidden');
            feed.classList.add('visible');
            scrollHint.style.display = 'block';
            setTimeout(function() { setupObserver(); setupRestart(); setupBirdEasterEgg(); }, 100);
            feed.addEventListener('scroll', function() { scrollHint.classList.add('hidden'); }, { once: true });
            // Keyboard shortcut still available for desktop testing
            document.addEventListener('keydown', function(e) {
                if (e.key === 'g' || e.key === 'G') toggleGame();
            });
        }

        // ==========================================
        // GAME TOGGLE
        // ==========================================
        function toggleGame() {
            if (gameActive) hideGame(); else showGame();
        }

        function showGame() {
            gameActive = true;
            spawnSakuraPetals();
            var container = document.getElementById('game-container');
            container.style.display = 'block';
            feed.classList.add('game-active');
            setTimeout(function() { container.classList.add('active'); }, 10);
            initGame();
        }

        function hideGame() {
            gameActive = false;
            var container = document.getElementById('game-container');
            container.classList.remove('active');
            feed.classList.remove('game-active');
            setTimeout(function() { container.style.display = 'none'; stopGame(); }, 500);
        }

        function spawnSakuraPetals() {
            for (var i = 0; i < 20; i++) {
                var petal = document.createElement('div');
                petal.className = 'sakura-petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (2 + Math.random() * 3) + 's';
                petal.style.animationDelay = Math.random() * 1 + 's';
                petal.style.width = (8 + Math.random() * 10) + 'px';
                petal.style.height = petal.style.width;
                document.body.appendChild(petal);
                (function(p) { setTimeout(function() { p.remove(); }, 5000); })(petal);
            }
        }

        // ==========================================
        // FLAPPY TSURU GAME
        // ==========================================
        function resizeCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        }

        function initGame() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            gameState = 'start'; score = 0; scoreDisplay.textContent = '0';
            startScreen.style.display = 'flex'; overScreen.style.display = 'none';
            crane = { x: window.innerWidth * 0.25, y: window.innerHeight * 0.45, velocity: 0, rotation: 0, flapFrame: 0 };
            pipes = []; particles = []; clouds = generateClouds(); bgOffset = 0; frameCount = 0;
            drawFrame();
            canvas.addEventListener('touchstart', handleGameTap);
            canvas.addEventListener('mousedown', handleGameTap);
            document.getElementById('game-start-btn').addEventListener('click', startPlaying);
            document.getElementById('game-retry-btn').addEventListener('click', retryGame);
            document.getElementById('game-back-btn').addEventListener('click', hideGame);
        }

        function stopGame() {
            if (gameLoop) { cancelAnimationFrame(gameLoop); gameLoop = null; }
            canvas.removeEventListener('touchstart', handleGameTap);
            canvas.removeEventListener('mousedown', handleGameTap);
        }

        function startPlaying() {
            gameState = 'playing'; startScreen.style.display = 'none';
            crane.velocity = FLAP_FORCE; crane.flapFrame = 10; runGameLoop();
        }

        function retryGame() {
            overScreen.style.display = 'none'; score = 0; scoreDisplay.textContent = '0';
            crane = { x: window.innerWidth * 0.25, y: window.innerHeight * 0.45, velocity: 0, rotation: 0, flapFrame: 0 };
            pipes = []; particles = []; frameCount = 0; gameState = 'playing';
            crane.velocity = FLAP_FORCE; crane.flapFrame = 10; runGameLoop();
        }

        function handleGameTap(e) {
            e.preventDefault();
            if (gameState === 'playing') {
                crane.velocity = FLAP_FORCE; crane.flapFrame = 10;
                for (var i = 0; i < 3; i++) particles.push({ x: crane.x-5, y: crane.y+5, vx: -Math.random()*2-1, vy: Math.random()*2-1, life: 20, maxLife: 20, color: '#F5F0EB' });
            }
        }

        function generateClouds() {
            var c = [], w = window.innerWidth, h = window.innerHeight;
            for (var i = 0; i < 6; i++) c.push({ x: Math.random()*w*1.5, y: Math.random()*h*0.4, width: 60+Math.random()*80, speed: 0.3+Math.random()*0.5, opacity: 0.1+Math.random()*0.15 });
            return c;
        }

        function runGameLoop() {
            function loop() { if (gameState !== 'playing') return; update(); drawFrame(); gameLoop = requestAnimationFrame(loop); }
            gameLoop = requestAnimationFrame(loop);
        }

        function update() {
            frameCount++;
            var w = window.innerWidth, h = window.innerHeight;
            crane.velocity += GRAVITY; crane.y += crane.velocity;
            crane.rotation = Math.min(Math.max(crane.velocity * 3, -30), 70);
            if (crane.flapFrame > 0) crane.flapFrame--;
            bgOffset += PIPE_SPEED * 0.3;
            clouds.forEach(function(c) { c.x -= c.speed; if (c.x + c.width < 0) { c.x = w + Math.random()*100; c.y = Math.random()*h*0.4; } });
            if (frameCount % PIPE_INTERVAL === 0) pipes.push({ x: w+PIPE_WIDTH, gapY: 100+Math.random()*(h-250), scored: false });
            pipes.forEach(function(p) {
                p.x -= PIPE_SPEED;
                if (!p.scored && p.x+PIPE_WIDTH < crane.x) { p.scored = true; score++; scoreDisplay.textContent = score;
                    for (var i=0;i<5;i++) particles.push({ x:crane.x+20,y:crane.y,vx:Math.random()*3,vy:-Math.random()*3-1,life:30,maxLife:30,color:'#D4728C' }); }
            });
            pipes = pipes.filter(function(p) { return p.x+PIPE_WIDTH > -50; });
            particles.forEach(function(p) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; });
            particles = particles.filter(function(p) { return p.life > 0; });
            if (frameCount % 40 === 0) particles.push({ x:w+10,y:Math.random()*h*0.6,vx:-PIPE_SPEED-Math.random(),vy:0.5+Math.random(),life:200,maxLife:200,color:Math.random()>0.5?'#E88AA3':'#F0D0C0',isSakura:true,rot:Math.random()*360 });
            if (crane.y < 0 || crane.y > h-50) { gameOver(); return; }
            for (var i=0; i<pipes.length; i++) { var p=pipes[i];
                if (crane.x+CRANE_SIZE > p.x && crane.x-CRANE_SIZE < p.x+PIPE_WIDTH) {
                    if (crane.y-CRANE_SIZE < p.gapY-PIPE_GAP/2 || crane.y+CRANE_SIZE > p.gapY+PIPE_GAP/2) { gameOver(); return; } } }
        }

        function gameOver() {
            gameState = 'over';
            if (score > highScore) { highScore = score; localStorage.setItem('flappy_tsuru_high', highScore.toString()); }
            finalScoreDisplay.textContent = score;
            highScoreDisplay.textContent = '最高記録: ' + highScore;
            overScreen.style.display = 'flex';
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function drawFrame() {
            var w = window.innerWidth, h = window.innerHeight;
            ctx.clearRect(0, 0, w, h);
            var skyGrad = ctx.createLinearGradient(0,0,0,h);
            skyGrad.addColorStop(0,'#1a1a2e'); skyGrad.addColorStop(0.3,'#2D3B2D'); skyGrad.addColorStop(0.7,'#344034'); skyGrad.addColorStop(1,'#1a2a1a');
            ctx.fillStyle = skyGrad; ctx.fillRect(0,0,w,h);
            ctx.beginPath(); ctx.arc(w*0.8,h*0.12,30,0,Math.PI*2); ctx.fillStyle='rgba(245,240,235,0.15)'; ctx.fill();
            ctx.beginPath(); ctx.arc(w*0.8,h*0.12,25,0,Math.PI*2); ctx.fillStyle='rgba(245,240,235,0.08)'; ctx.fill();
            clouds.forEach(function(c) { ctx.beginPath(); ctx.ellipse(c.x,c.y,c.width/2,15,0,0,Math.PI*2); ctx.fillStyle='rgba(143,169,143,'+c.opacity+')'; ctx.fill(); });
            drawSkyline(w,h); drawFuji(w,h);
            particles.filter(function(p){return p.isSakura;}).forEach(function(p) { ctx.save(); ctx.translate(p.x,p.y); ctx.rotate((p.rot+frameCount*2)*Math.PI/180); ctx.beginPath(); ctx.ellipse(0,0,5,3,0,0,Math.PI*2); ctx.fillStyle=p.color; ctx.globalAlpha=p.life/p.maxLife*0.5; ctx.fill(); ctx.restore(); });
            drawGround(w,h); pipes.forEach(function(p){drawTorii(p,h);}); drawCrane();
            particles.filter(function(p){return !p.isSakura;}).forEach(function(p) { ctx.beginPath(); ctx.arc(p.x,p.y,3*(p.life/p.maxLife),0,Math.PI*2); ctx.fillStyle=p.color; ctx.globalAlpha=p.life/p.maxLife; ctx.fill(); ctx.globalAlpha=1; });
        }

        function drawSkyline(w,h) {
            var baseY=h-50; ctx.fillStyle='rgba(30,45,30,0.4)'; var offset=-(bgOffset*0.2)%w;
            var buildings=[{x:0,w:30,h:80},{x:40,w:20,h:120},{x:70,w:35,h:60},{x:110,w:15,h:150},{x:135,w:25,h:90},{x:170,w:40,h:70},{x:220,w:12,h:180},{x:240,w:30,h:100},{x:280,w:20,h:130},{x:310,w:35,h:75},{x:355,w:18,h:160},{x:380,w:25,h:95},{x:415,w:30,h:110},{x:455,w:15,h:140}];
            buildings.forEach(function(b) { var bx=((b.x+offset)%(w+100)); if(bx<-50) bx+=w+100; ctx.fillRect(bx,baseY-b.h,b.w,b.h); if(b.h>140){ctx.fillStyle='rgba(212,114,140,0.2)';ctx.fillRect(bx+b.w/2-2,baseY-b.h-20,4,20);ctx.fillStyle='rgba(30,45,30,0.4)';} });
        }

        function drawFuji(w,h) {
            var fujiX=w*0.6-(bgOffset*0.05)%(w*0.3), fujiY=h*0.55;
            ctx.beginPath(); ctx.moveTo(fujiX-120,fujiY+40); ctx.lineTo(fujiX,fujiY-60); ctx.lineTo(fujiX+120,fujiY+40); ctx.closePath(); ctx.fillStyle='rgba(60,80,60,0.2)'; ctx.fill();
            ctx.beginPath(); ctx.moveTo(fujiX-30,fujiY-35); ctx.lineTo(fujiX,fujiY-60); ctx.lineTo(fujiX+30,fujiY-35); ctx.closePath(); ctx.fillStyle='rgba(245,240,235,0.15)'; ctx.fill();
        }

        function drawGround(w,h) {
            var groundY=h-50; var gg=ctx.createLinearGradient(0,groundY,0,h); gg.addColorStop(0,'#2a3a2a'); gg.addColorStop(1,'#1a2a1a'); ctx.fillStyle=gg; ctx.fillRect(0,groundY,w,50);
            ctx.strokeStyle='rgba(143,169,143,0.3)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(0,groundY); ctx.lineTo(w,groundY); ctx.stroke();
        }

        function drawTorii(pipe,h) {
            var topH=pipe.gapY-PIPE_GAP/2, bottomY=pipe.gapY+PIPE_GAP/2, bottomH=h-50-bottomY, x=pipe.x, pw=PIPE_WIDTH;
            ctx.fillStyle='#C4424B'; ctx.fillRect(x+5,0,10,topH); ctx.fillRect(x+pw-15,0,10,topH);
            ctx.fillStyle='#8B2020'; ctx.fillRect(x-8,topH-12,pw+16,12); ctx.fillStyle='#C4424B'; ctx.fillRect(x-5,topH-22,pw+10,12); ctx.fillStyle='#D4A84B'; ctx.fillRect(x-5,topH-24,pw+10,3);
            ctx.fillStyle='#C4424B'; ctx.fillRect(x+5,bottomY,10,bottomH); ctx.fillRect(x+pw-15,bottomY,10,bottomH);
            ctx.fillStyle='#8B2020'; ctx.fillRect(x-8,bottomY,pw+16,12); ctx.fillStyle='#C4424B'; ctx.fillRect(x-5,bottomY+10,pw+10,12); ctx.fillStyle='#D4A84B'; ctx.fillRect(x-5,bottomY+22,pw+10,3);
            ctx.fillStyle='#8B2020'; ctx.fillRect(x+8,bottomY+25,pw-16,5);
        }

        function drawCrane() {
            ctx.save(); ctx.translate(crane.x,crane.y); ctx.rotate(crane.rotation*Math.PI/180);
            ctx.fillStyle='#F5F0EB'; ctx.beginPath(); ctx.ellipse(0,0,CRANE_SIZE,CRANE_SIZE*0.55,0,0,Math.PI*2); ctx.fill();
            var wingAngle=crane.flapFrame>0?-25:10; ctx.save(); ctx.rotate(wingAngle*Math.PI/180);
            ctx.fillStyle='#E0D8D0'; ctx.beginPath(); ctx.ellipse(-5,-5,CRANE_SIZE*0.7,CRANE_SIZE*0.3,-0.3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#2D3B2D'; ctx.beginPath(); ctx.ellipse(-15,-8,CRANE_SIZE*0.3,CRANE_SIZE*0.15,-0.3,0,Math.PI*2); ctx.fill(); ctx.restore();
            ctx.strokeStyle='#F5F0EB'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(CRANE_SIZE*0.5,-3); ctx.quadraticCurveTo(CRANE_SIZE*0.8,-10,CRANE_SIZE*0.9,-15); ctx.stroke();
            ctx.fillStyle='#F5F0EB'; ctx.beginPath(); ctx.arc(CRANE_SIZE*0.9,-16,6,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#D4728C'; ctx.beginPath(); ctx.arc(CRANE_SIZE*0.9,-20,4,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#D4A84B'; ctx.beginPath(); ctx.moveTo(CRANE_SIZE*0.9+6,-16); ctx.lineTo(CRANE_SIZE*0.9+14,-15); ctx.lineTo(CRANE_SIZE*0.9+6,-14); ctx.closePath(); ctx.fill();
            ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.arc(CRANE_SIZE*0.92,-16,1.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#2D3B2D'; ctx.beginPath(); ctx.moveTo(-CRANE_SIZE*0.7,0); ctx.lineTo(-CRANE_SIZE*1.1,-8); ctx.lineTo(-CRANE_SIZE*0.9,-2); ctx.lineTo(-CRANE_SIZE*1.2,-3); ctx.lineTo(-CRANE_SIZE*0.8,3); ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        // ==========================================
        // INIT
        // ==========================================
        buildCards();
        if (localStorage.getItem(STORAGE_KEY) === CORRECT_PASSWORD) {
            unlock();
        } else {
            scrollHint.style.display = 'none';
        }

        passwordBtn.addEventListener('click', function() {
            var pw = passwordInput.value.trim();
            if (pw === CORRECT_PASSWORD) { localStorage.setItem(STORAGE_KEY, pw); unlock(); }
            else { passwordError.classList.add('visible'); passwordInput.style.borderColor='var(--accent-pink)'; setTimeout(function(){passwordError.classList.remove('visible');passwordInput.style.borderColor='';},2000); }
        });
        passwordInput.addEventListener('keydown', function(e) { if (e.key==='Enter') passwordBtn.click(); });
    </script>
</body>
</html>
